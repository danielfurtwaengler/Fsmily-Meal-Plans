<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Family Assistant" />
  <title>Family Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #faf7f2; height: 100dvh; display: flex; flex-direction: column; }
    header { background: #1c1c1c; color: white; padding: 16px 20px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #1c1c1c; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .assistant { background: white; color: #1c1c1c; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #f0ebe3; }
    .typing { color: #9ca3af; font-style: italic; font-size: 13px; align-self: flex-start; padding: 8px 0; }
    footer { background: white; border-top: 1px solid #e5e7eb; padding: 12px 16px; display: flex; gap: 8px; }
    textarea { flex: 1; border: 1.5px solid #e5e7eb; border-radius: 20px; padding: 10px 16px; font-size: 14px; font-family: inherit; resize: none; outline: none; max-height: 100px; line-height: 1.4; }
    textarea:focus { border-color: #1c1c1c; }
    button { background: #1c1c1c; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    button:disabled { opacity: 0.4; }
    .suggestions { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 16px 12px; }
    .chip { background: white; border: 1.5px solid #e5e7eb; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; color: #374151; }
    .chip:hover { border-color: #1c1c1c; }
  </style>
</head>
<body>
  <header>
    <h1>Family Assistant 🏠</h1>
    <p>Amelia · Lily · Daniel · Meliza · Singapore</p>
  </header>

  <div id="messages">
    <div class="msg assistant">Hi Lily! 👋 I'm your family assistant. I know all about your family's food preferences and can help with meal plans, grocery lists, and more. What do you need?</div>
  </div>

  <div class="suggestions">
    <div class="chip" onclick="send('Meal plan for this week')">🍽️ Meal plan</div>
    <div class="chip" onclick="send('Generate grocery list')">🛒 Grocery list</div>
    <div class="chip" onclick="send('Quick lunch ideas for Amelia')">👶 Amelia lunch</div>
  </div>

  <footer>
    <textarea id="input" rows="1" placeholder="Ask anything…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button id="btn" onclick="send()">↑</button>
  </footer>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function send(text) {
      const msg = text || input.value.trim();
      if (!msg) return;
      input.value = '';
      btn.disabled = true;

      addMsg(msg, 'user');

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = 'Thinking…';
      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        typing.remove();
        addMsg(data.reply, 'assistant');
      } catch {
        typing.remove();
        addMsg('Something went wrong. Please try again.', 'assistant');
      }

      btn.disabled = false;
      input.focus();
    }

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });
  </script>
</body>
</html>
